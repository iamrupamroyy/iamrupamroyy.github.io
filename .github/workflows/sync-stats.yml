name: Daily CP Stats Sync

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Latest Stats
        run: |
          node <<'EOF'
          const fs = require('fs');
          
          async function sync() {
            const config = JSON.parse(fs.readFileSync('src/data/config.json', 'utf8'));
            const PLATFORMS = config.cpPlatforms;
            const stats = {};
            
            for (const platform of PLATFORMS) {
              const username = platform.username;
              const id = platform.id;
              console.log(`>>> SYNCING: ${id}`);

              if (id === 'leetcode') {
                const lcSources = [
                  `https://alfa-leetcode-api.onrender.com/${username}/solved`,
                  `https://leetcode-stats-api.herokuapp.com/${username}`
                ];
                for (const src of lcSources) {
                  try {
                    const res = await fetch(src, { signal: AbortSignal.timeout(10000) });
                    const data = await res.json();
                    if (data.solvedProblem || data.totalSolved) {
                      const solved = data.solvedProblem || data.totalSolved;
                      stats.leetcode = {
                        rank: 'KNIGHT_TIER',
                        percent: data.topPercentage || 12,
                        lastSolved: `${solved} Problems Solved`,
                        rating: solved
                      };
                      console.log('LC SUCCESS');
                      break;
                    }
                  } catch (e) { console.log('LC Source failed'); }
                }
              }

              if (id === 'codeforces') {
                try {
                  const res = await fetch(`https://codeforces.com/api/user.info?handles=${username}`);
                  const data = await res.json();
                  if (data.status === 'OK') {
                    const u = data.result[0];
                    stats.codeforces = {
                      rank: (u.rank || 'Newbie').toUpperCase(),
                      percent: Math.min(Math.round((u.rating / 3000) * 100), 100),
                      lastSolved: `Max_Rating: ${u.maxRating}`,
                      rating: u.rating
                    };
                    console.log('CF SUCCESS');
                  }
                } catch (e) {}
              }

              if (id === 'codechef') {
                try {
                  const res = await fetch(`https://www.codechef.com/users/${username}`);
                  const html = await res.text();
                  
                  const ratingMatch = html.match(/class=\"rating-number\">\s*(\d+)/);
                  const starBlock = html.match(/<div class=\"rating-star\">([\s\S]*?)<\/div>/);
                  const stars = starBlock ? (starBlock[1].match(/&#9733;/g) || []).length : 0;
                  const rankMatch = html.match(/<a href=\"\/ratings\/all\">\s*<strong>\s*(\d+)\s*<\/strong>\s*<\/a>\s*Global Rank/);
                  
                  if (ratingMatch) {
                    const rating = ratingMatch[1];
                    const rank = rankMatch ? rankMatch[1] : 'N/A';
                    stats.codechef = {
                      rank: `${stars} ★ GRADE`,
                      percent: Math.min(Math.round((parseInt(rating) / 3000) * 100), 100),
                      lastSolved: `Global_Rank: #${rank}`,
                      rating: rating
                    };
                    console.log('CC SUCCESS');
                  }
                } catch (e) {
                   console.log('CC SCRAPE FAILED');
                }
              }
            }

            stats.lastUpdated = new Date().toISOString();
            fs.writeFileSync('src/data/stats.json', JSON.stringify(stats, null, 2));
          }
          sync();
          EOF

      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add -f src/data/stats.json
          git commit -m "chore: update daily cp stats [skip ci]" || echo "No changes to commit"
          git push

      - name: Trigger Deployment
        if: success()
        run: |
          curl -X POST -H "Authorization: token ${{ secrets.GH_PAT }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
          -d '{"ref":"main"}'
