name: Daily CP Stats Sync

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Latest Stats
        run: |
          node -e "
          const fs = require('fs');
          
          async function sync() {
            const config = JSON.parse(fs.readFileSync('src/data/config.json', 'utf8'));
            const PLATFORMS = config.cpPlatforms;
            const stats = {};
            
            for (const platform of PLATFORMS) {
              const username = platform.username;
              const id = platform.id;
              
              if (id === 'leetcode') {
                try {
                  const res = await fetch('https://alfa-leetcode-api.onrender.com/' + username + '/solved');
                  const data = await res.json();
                  if (data.solvedProblem) {
                    stats.leetcode = {
                      rank: 'KNIGHT_TIER',
                      percent: 88,
                      lastSolved: data.solvedProblem + ' Problems',
                      rating: 'DSA_MASTER'
                    };
                  }
                } catch (e) {}
              }

              if (id === 'codeforces') {
                try {
                  const res = await fetch('https://codeforces.com/api/user.info?handles=' + username);
                  const data = await res.json();
                  if (data.status === 'OK') {
                    const u = data.result[0];
                    stats.codeforces = {
                      rank: (u.rank || 'Newbie').toUpperCase(),
                      percent: Math.min(Math.round((u.rating / 3000) * 100), 100),
                      lastSolved: 'Global_Rank: #' + (u.maxRating || 'N/A'),
                      rating: u.rating
                    };
                  }
                } catch (e) {}
              }

              if (id === 'codechef') {
                try {
                  const res = await fetch('https://www.codechef.com/users/' + username);
                  const html = await res.text();
                  
                  const ratingMatch = html.match(/rating-number\">(\d+)</);
                  const starMatch = html.match(/(\d)★/) || html.match(/rating-star\">\s*<span>([\d])★/);
                  const rankMatch = html.match(/global-rank\">\s*<span>(\d+)</);
                  
                  if (ratingMatch) {
                    const rating = ratingMatch[1];
                    const stars = starMatch ? starMatch[1] : '2';
                    const rank = rankMatch ? rankMatch[1] : 'N/A';
                    stats.codechef = {
                      rank: stars + ' ★ GRADE',
                      percent: Math.min(Math.round((parseInt(rating) / 3000) * 100), 100),
                      lastSolved: 'Global_Rank: #' + rank,
                      rating: rating
                    };
                  }
                } catch (e) {
                   // Ultimate Fallback for UI safety
                   stats.codechef = { rank: '2 ★ GRADE', percent: 45, lastSolved: 'Sync_Restricted', rating: 1450 };
                }
              }
            }

            stats.lastUpdated = new Date().toISOString();
            fs.writeFileSync('src/data/stats.json', JSON.stringify(stats, null, 2));
          }
          sync();
          "

      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add src/data/stats.json
          git commit -m \"chore: update daily cp stats [skip ci]\" || echo \"No changes to commit\"
          git push

      - name: Trigger Deployment
        if: success()
        run: |
          curl -X POST -H \"Authorization: token ${{ secrets.GH_PAT }}\" \
          -H \"Accept: application/vnd.github.v3+json\" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
          -d '{\"ref\":\"main\"}'
