name: Daily CP Stats Sync

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Latest Stats
        run: |
          node -e "
          const fs = require('fs');
          
          async function sync() {
            const config = JSON.parse(fs.readFileSync('src/data/config.json', 'utf8'));
            const PLATFORMS = config.cpPlatforms;
            const stats = {};
            
            for (const platform of PLATFORMS) {
              const username = platform.username;
              const id = platform.id;
              
              console.log('--- SYNCING: ' + id + ' ---');

              if (id === 'codeforces') {
                try {
                  const res = await fetch('https://codeforces.com/api/user.info?handles=' + username);
                  const cfData = await res.json();
                  if (cfData.status === 'OK') {
                    const u = cfData.result[0];
                    stats.codeforces = {
                      rank: (u.rank || 'Newbie').toUpperCase() + ' (' + u.rating + ')',
                      percent: Math.min(Math.round((u.rating / 3000) * 100), 100),
                      lastSolved: 'Rating: ' + u.rating,
                      rating: u.rating
                    };
                  }
                } catch (e) { console.log('DEBUG: CF Error'); }
              }

              if (id === 'leetcode') {
                try {
                  const res = await fetch('https://alfa-leetcode-api.onrender.com/' + username);
                  const lcData = await res.json();
                  if (lcData.username) {
                    const solved = lcData.matchedUserStats.acSubmissionNum[0].count;
                    const topPct = lcData.userRanking?.topPercentage || 12;
                    stats.leetcode = {
                      rank: 'Top ' + topPct + '%',
                      percent: 100 - topPct,
                      lastSolved: solved + ' Problems Solved',
                      rating: solved
                    };
                  }
                } catch (e) { console.log('DEBUG: LC Error'); }
              }

              if (id === 'codechef') {
                try {
                  let ccData = null;
                  const sources = [
                    'https://codechef-api.vercel.app/' + username,
                    'https://code-chef-api.vercel.app/details/' + username
                  ];

                  for (const src of sources) {
                    try {
                      console.log('DEBUG: Trying ' + src);
                      const res = await fetch(src, { signal: AbortSignal.timeout(12000) });
                      ccData = await res.json();
                      
                      // Check for various possible field names
                      const rating = ccData.currentRating || ccData.rating || ccData.current_rating;
                      if (rating) {
                        console.log('DEBUG: Success! Found Rating: ' + rating);
                        const stars = (ccData.stars || ccData.rating_number || '2').toString().replace(/[★\*]/g, '');
                        stats.codechef = {
                          rank: stars + ' STAR (' + rating + ')',
                          percent: Math.min(Math.round((rating / 3000) * 100), 100),
                          lastSolved: 'Global Rank: #' + (ccData.globalRank || ccData.global_rank || 'N/A'),
                          rating: rating
                        };
                        break;
                      }
                      console.log('DEBUG: JSON received but no rating found. Keys: ' + Object.keys(ccData).join(', '));
                    } catch (err) { continue; }
                  }
                } catch (e) { console.log('DEBUG: CC Exhausted'); }
              }
            }

            stats.lastUpdated = new Date().toISOString();
            fs.writeFileSync('src/data/stats.json', JSON.stringify(stats, null, 2));
          }
          sync();
          "

      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add src/data/stats.json
          git commit -m "chore: update daily cp stats [skip ci]" || echo "No changes to commit"
          git push

      - name: Trigger Deployment
        if: success()
        run: |
          curl -X POST -H "Authorization: token ${{ secrets.GH_PAT }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
          -d '{"ref":"main"}'
