name: Daily CP Stats Sync

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Latest Stats
        run: |
          node -e "
          const fs = require('fs');
          
          async function sync() {
            const config = JSON.parse(fs.readFileSync('src/data/config.json', 'utf8'));
            const PLATFORMS = config.cpPlatforms;
            const stats = {};
            
            for (const platform of PLATFORMS) {
              const username = platform.username;
              const id = platform.id;
              
              console.log('>>> INITIALIZING SYNC: ' + id);

              // --- LEETCODE STRATEGY ---
              if (id === 'leetcode') {
                const lcSources = [
                  'https://alfa-leetcode-api.onrender.com/' + username + '/solved',
                  'https://leetcode-stats-api.herokuapp.com/' + username
                ];
                for (const src of lcSources) {
                  try {
                    console.log('LC_TRY: ' + src);
                    const res = await fetch(src, { signal: AbortSignal.timeout(10000) });
                    const data = await res.json();
                    if (data.solvedProblem || data.totalSolved) {
                      const solved = data.solvedProblem || data.totalSolved;
                      stats.leetcode = {
                        rank: 'KNIGHT_TIER',
                        percent: data.topPercentage || 12,
                        lastSolved: solved + ' Problems Solved',
                        rating: solved
                      };
                      console.log('LC_SUCCESS: ' + solved);
                      break;
                    }
                  } catch (e) { console.log('LC_FAILED_SOURCE: ' + e.message); }
                }
              }

              // --- CODEFORCES STRATEGY ---
              if (id === 'codeforces') {
                try {
                  const res = await fetch('https://codeforces.com/api/user.info?handles=' + username);
                  const data = await res.json();
                  if (data.status === 'OK') {
                    const u = data.result[0];
                    stats.codeforces = {
                      rank: (u.rank || 'Newbie').toUpperCase(),
                      percent: Math.min(Math.round((u.rating / 3000) * 100), 100),
                      lastSolved: 'Global_Rank: #' + (u.maxRating || 'N/A'),
                      rating: u.rating
                    };
                    console.log('CF_SUCCESS: ' + u.rating);
                  }
                } catch (e) { console.log('CF_FAILED: ' + e.message); }
              }

              // --- CODECHEF STRATEGY ---
              if (id === 'codechef') {
                const ccSources = [
                  'https://codechef-api.vercel.app/' + username,
                  'https://code-chef-api.vercel.app/details/' + username
                ];
                for (const src of ccSources) {
                  try {
                    console.log('CC_TRY: ' + src);
                    const res = await fetch(src, { signal: AbortSignal.timeout(15000) });
                    const data = await res.json();
                    const rating = data.currentRating || data.rating || data.current_rating;
                    if (rating) {
                      const stars = (data.stars || data.rating_number || '2').toString().replace(/[★\*]/g, '');
                      stats.codechef = {
                        rank: stars + ' STAR_GRADE',
                        percent: Math.min(Math.round((rating / 3000) * 100), 100),
                        lastSolved: 'Global_Rank: #' + (data.globalRank || data.global_rank || 'N/A'),
                        rating: rating
                      };
                      console.log('CC_SUCCESS: ' + rating);
                      break;
                    }
                  } catch (e) { console.log('CC_FAILED_SOURCE: ' + e.message); }
                }
              }
            }

            stats.lastUpdated = new Date().toISOString();
            fs.writeFileSync('src/data/stats.json', JSON.stringify(stats, null, 2));
            console.log('>>> SYNC_FINALIZED');
          }
          sync();
          "

      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add src/data/stats.json
          git commit -m "chore: update daily cp stats [skip ci]" || echo "No changes to commit"
          git push

      - name: Trigger Deployment
        if: success()
        run: |
          curl -X POST -H "Authorization: token ${{ secrets.GH_PAT }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
          -d '{"ref":"main"}'
