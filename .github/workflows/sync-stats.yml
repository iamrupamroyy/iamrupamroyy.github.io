name: Daily CP Stats Sync

on:
  schedule:
    - cron: '0 0 * * *' # Runs every 24 hours at midnight
  push:
    branches: [ main ] # Runs on every push to main
  workflow_dispatch: # Allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Latest Stats
        run: |
          node -e "
          const fs = require('fs');
          
          async function sync() {
            // Load usernames from central config
            const config = JSON.parse(fs.readFileSync('src/data/config.json', 'utf8'));
            const PLATFORMS = config.cpPlatforms;
            const stats = {};
            
            for (const platform of PLATFORMS) {
              const username = platform.username;
              const id = platform.id;
              
              console.log('Syncing ' + id + ' for ' + username + '...');

              if (id === 'codeforces') {
                try {
                  const cfRes = await fetch('https://codeforces.com/api/user.info?handles=' + username);
                  const cfData = await cfRes.json();
                  if (cfData.status === 'OK') {
                    const user = cfData.result[0];
                    stats.codeforces = {
                      rank: (user.rank || 'Expert').toUpperCase() + ' (' + user.rating + ')',
                      percent: Math.min(Math.round((user.rating / 3000) * 100), 100),
                      lastSolved: 'Rating: ' + user.rating
                    };
                  }
                } catch (e) { console.error('CF failed', e); }
              }

              if (id === 'leetcode') {
                try {
                  const lcRes = await fetch('https://alfa-leetcode-api.onrender.com/' + username + '/solved');
                  const lcData = await lcRes.json();
                  if (lcData.solvedProblem) {
                    stats.leetcode = {
                      rank: 'Solved: ' + lcData.solvedProblem,
                      percent: Math.min(Math.round((lcData.solvedProblem / 3200) * 100), 100),
                      lastSolved: lcData.solvedProblem + ' Problems'
                    };
                  }
                } catch (e) { console.error('LC failed', e); }
              }

              if (id === 'codechef') {
                try {
                  let ccData = null;
                  const sources = [
                    'https://codechef-api.vercel.app/' + username,
                    'https://code-chef-api.vercel.app/details/' + username,
                    'https://codechef-api--prakhar-doneria.repl.co/' + username
                  ];

                  for (const src of sources) {
                    try {
                      console.log('Trying CC Source: ' + src);
                      const res = await fetch(src, { signal: AbortSignal.timeout(10000) });
                      ccData = await res.json();
                      if (ccData && (ccData.currentRating || ccData.rating)) break;
                    } catch (e) { continue; }
                  }

                  if (ccData) {
                    const rating = ccData.currentRating || ccData.rating || 0;
                    const stars = (ccData.stars || ccData.rating_number || '2 Star').toString().replace(/[★\*]/g, '').trim();
                    stats.codechef = {
                      rank: stars + ' STAR (' + rating + ')',
                      percent: Math.min(Math.round((rating / 3000) * 100), 100),
                      lastSolved: 'Global Rank: #' + (ccData.globalRank || ccData.global_rank || 'N/A')
                    };
                    console.log('CC Success: ' + stats.codechef.rank);
                  }
                } catch (e) { console.error('All CC sources failed', e); }
              }
            }

            stats.lastUpdated = new Date().toISOString();
            fs.writeFileSync('src/data/stats.json', JSON.stringify(stats, null, 2));
            console.log('Stats updated successfully');
          }
          sync();
          "

      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add src/data/stats.json
          git commit -m "chore: update daily cp stats [skip ci]" || echo "No changes to commit"
          git push

      - name: Trigger Deployment
        if: success()
        run: |
          curl -X POST -H "Authorization: token ${{ secrets.GH_PAT }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
          -d '{"ref":"main"}'
