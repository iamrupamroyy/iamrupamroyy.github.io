name: Daily CP Stats Sync

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Latest Stats
        run: |
          node <<'EOF'
          const fs = require('fs');
          
          async function sync() {
            console.log('--- STARTING SYNC PROCESS ---');
            let config;
            try {
              config = JSON.parse(fs.readFileSync('src/data/config.json', 'utf8'));
            } catch (e) {
              console.error('Error: Could not read config.json');
              process.exit(1);
            }
            
            const PLATFORMS = config.cpPlatforms;
            const stats = {};
            
            for (const platform of PLATFORMS) {
              const username = platform.username;
              const id = platform.id;
              console.log(`Syncing platform: ${id} for user: ${username}`);

              if (id === 'leetcode') {
                try {
                  const res = await fetch(`https://alfa-leetcode-api.onrender.com/${username}`);
                  const data = await res.json();
                  if (data && data.username) {
                    const solved = data.matchedUserStats.acSubmissionNum[0].count;
                    const topPct = data.userRanking?.topPercentage || 12;
                    stats.leetcode = {
                      rank: `TOP ${topPct}%`,
                      percent: 100 - topPct,
                      lastSolved: `${solved} Problems Solved`,
                      rating: solved
                    };
                    console.log('LeetCode Success');
                  }
                } catch (e) { console.error('LeetCode Error:', e.message); }
              }

              if (id === 'codeforces') {
                try {
                  const res = await fetch(`https://codeforces.com/api/user.info?handles=${username}`);
                  const data = await res.json();
                  if (data.status === 'OK') {
                    const u = data.result[0];
                    stats.codeforces = {
                      rank: (u.rank || 'Newbie').toUpperCase(),
                      percent: Math.min(Math.round((u.rating / 3000) * 100), 100),
                      lastSolved: `Global_Rank: #${u.maxRating || 'N/A'}`,
                      rating: u.rating
                    };
                    console.log('Codeforces Success');
                  }
                } catch (e) { console.error('Codeforces Error:', e.message); }
              }

              if (id === 'codechef') {
                try {
                  console.log('Attempting CodeChef Direct Scrape...');
                  const res = await fetch(`https://www.codechef.com/users/${username}`, {
                    headers: { 'User-Agent': 'Mozilla/5.0' }
                  });
                  const html = await res.text();
                  
                  const ratingMatch = html.match(/rating-number">(\d+)</);
                  const starMatch = html.match(/(\d)★/);
                  const rankMatch = html.match(/global-rank">\s*<span>(\d+)</);
                  
                  if (ratingMatch) {
                    const rating = ratingMatch[1];
                    const stars = starMatch ? starMatch[1] : '2';
                    const rank = rankMatch ? rankMatch[1] : 'N/A';
                    stats.codechef = {
                      rank: `${stars} ★ GRADE`,
                      percent: Math.min(Math.round((parseInt(rating) / 3000) * 100), 100),
                      lastSolved: `Global_Rank: #${rank}`,
                      rating: rating
                    };
                    console.log('CodeChef Success');
                  } else {
                    console.log('CodeChef Pattern not found in HTML');
                  }
                } catch (e) { console.error('CodeChef Error:', e.message); }
              }
            }

            stats.lastUpdated = new Date().toISOString();
            fs.writeFileSync('src/data/stats.json', JSON.stringify(stats, null, 2));
            console.log('--- SYNC PROCESS COMPLETE ---');
          }
          sync();
          EOF

      - name: Commit and Push changes
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add src/data/stats.json
          git commit -m "chore: update daily cp stats [skip ci]" || echo "No changes to commit"
          git push

      - name: Trigger Deployment
        if: success()
        run: |
          curl -X POST -H "Authorization: token ${{ secrets.GH_PAT }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy.yml/dispatches \
          -d '{"ref":"main"}'
